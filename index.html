<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Pulsador Online en Tiempo Real ⚡</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: #121214; color: #fff; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* PANTALLAS PRINCIPALES */
        .screen { display: none; flex-direction: column; flex: 1; width: 100%; height: 100%; }
        .active { display: flex; }

        /* SELECCIÓN DE ROL */
        #role-screen { justify-content: center; align-items: center; background: radial-gradient(circle, #1a1a2e 0%, #0f0f1a 100%); }
        .role-box { text-align: center; max-width: 400px; padding: 30px; background: #1a1a1e; border-radius: 15px; border: 1px solid #2a2a30; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .role-btn { display: block; width: 100%; padding: 15px; margin: 15px 0; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; transition: transform 0.2s, background 0.2s; }
        .btn-prof { background-color: #00ffcc; color: #121214; }
        .btn-alum { background-color: #0055ff; color: #fff; }
        .role-btn:hover { transform: scale(1.03); }

        /* VISTA PROFESOR */
        header { background-color: #1a1a1e; padding: 15px; text-align: center; border-bottom: 2px solid #2a2a30; }
        header h1 { font-size: 1.8rem; color: #00ffcc; letter-spacing: 1px; }
        .arena { display: flex; flex: 1; position: relative; }
        .lane { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: all 0.5s ease; border-right: 2px solid #121214; }
        #lane-Azul { background: linear-gradient(135deg, #0d1b2a, #0055ff); }
        #lane-Verde { background: linear-gradient(135deg, #0b2516, #00b34a); }
        #lane-Rosa { background: linear-gradient(135deg, #2b0c1e, #e60067); }
        .lane-name { font-size: 2.5rem; font-weight: bold; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .lane-status { font-size: 1.5rem; margin-top: 15px; font-weight: 300; opacity: 0.7; }
        
        /* Animación de ganador para el Profesor */
        .arena.has-winner .lane:not(.winner-lane) { flex: 0; width: 0; opacity: 0; overflow: hidden; border: none; }
        .arena.has-winner .lane.winner-lane { flex: 1; width: 100%; }
        .winner-lane .lane-name { font-size: 5rem; animation: pulse 1s infinite alternate; }
        .winner-lane .lane-status { opacity: 1; font-size: 2.5rem; font-weight: bold; }
        #reset-btn { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); padding: 15px 40px; font-size: 1.2rem; font-weight: bold; background: #fff; color: #121214; border: none; border-radius: 50px; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 10; }

        /* VISTA ESTUDIANTE */
        #student-screen { justify-content: center; align-items: center; padding: 20px; background: #16161a; }
        .selector-box { text-align: center; width: 100%; max-width: 400px; }
        .team-select-btn { width: 100%; padding: 20px; margin: 10px 0; font-size: 1.5rem; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; color: white; text-transform: uppercase; }
        #btn-sel-Azul { background: #0055ff; } #btn-sel-Verde { background: #00b34a; } #btn-sel-Rosa { background: #e60067; }
        
        /* Botón gigante de pulsión */
        #buzzer-container { display: none; width: 100%; height: 100vh; flex-direction: column; justify-content: center; align-items: center; position: fixed; top:0; left:0; z-index: 100; }
        .buzzer-btn { width: 250px; height: 250px; border-radius: 50%; border: 15px solid rgba(255,255,255,0.2); color: white; font-size: 2.2rem; font-weight: bold; text-transform: uppercase; cursor: pointer; box-shadow: 0 15px 40px rgba(0,0,0,0.6); transition: transform 0.1s; }
        .buzzer-btn:active { transform: scale(0.92); }
        .blocked-msg { display: none; margin-top: 30px; font-size: 1.5rem; color: #ff3333; font-weight: bold; text-transform: uppercase; animation: flash 0.5s infinite alternate; }

        @keyframes pulse { from { text-shadow: 0 0 10px #fff; } to { text-shadow: 0 0 30px #fff; } }
        @keyframes flash { from { opacity: 0.4; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="role-screen" class="screen active">
        <div class="role-box">
            <h2>Pulsador Concurso</h2>
            <p style="color: #aaa; margin-bottom: 20px;">Elige tu rol en esta sesión</p>
            <button class="role-btn btn-prof" onclick="initProfesor()">💻 Pantalla de Profesor</button>
            <button class="role-btn btn-alum" onclick="initEstudiante()">📱 Entrar como Alumno</button>
        </div>
    </div>

    <div id="teacher-screen" class="screen">
        <header>
            <h1>⚡ PANEL PRINCIPAL DE VELOCIDAD ⚡</h1>
            <p style="color:#aaa; margin-top:5px;">Esperando que los alumnos presionen su botón...</p>
        </header>
        <div class="arena" id="arena-board">
            <div class="lane" id="lane-Azul"><div class="lane-name">Equipo Azul</div><div class="lane-status" id="status-Azul">Listo</div></div>
            <div class="lane" id="lane-Verde"><div class="lane-name">Equipo Verde</div><div class="lane-status" id="status-Verde">Listo</div></div>
            <div class="lane" id="lane-Rosa"><div class="lane-name">Equipo Rosa</div><div class="lane-status" id="status-Rosa">Listo</div></div>
            <button id="reset-btn" onclick="clickReset()">Siguiente Ronda (R)</button>
        </div>
    </div>

    <div id="student-screen" class="screen">
        <div class="selector-box" id="setup-student">
            <h2 style="margin-bottom: 20px;">¿A qué equipo perteneces?</h2>
            <button class="team-select-btn" id="btn-sel-Azul" onclick="selectTeam('Azul')">Equipo Azul</button>
            <button class="team-select-btn" id="btn-sel-Verde" onclick="selectTeam('Verde')">Equipo Verde</button>
            <button class="team-select-btn" id="btn-sel-Rosa" onclick="selectTeam('Rosa')">Equipo Rosa</button>
        </div>
    </div>

    <div id="buzzer-container">
        <button class="buzzer-btn" id="main-buzzer" onclick="pressBuzzer()">¡PULSAR!</button>
        <div class="blocked-msg" id="blocked-text">❌ ¡Bloqueado! Otro equipo ganó ❌</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Tus credenciales configuradas con éxito
        const firebaseConfig = {
            apiKey: "AIzaSyDpYhQI_6JW2xXTR3jU0JDD-bNX_-SG_3Q",
            authDomain: "pulsadoraula.firebaseapp.com",
            databaseURL: "https://pulsadoraula-default-rtdb.firebaseio.com",
            projectId: "pulsadoraula",
            storageBucket: "pulsadoraula.firebasestorage.app",
            messagingSenderId: "264276501069",
            appId: "1:264276501069:web:9286be98f4f9540052f204",
            measurementId: "G-9F14WWJ3D6"
        };

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const estadoRef = ref(db, 'sala_concurso');

        // Variables globales del estado local
        let miEquipo = null;
        let miRol = null; 
        let audioCtx = null;

        // Cambiar pantallas
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // --- LÓGICA DEL PROFESOR ---
        window.initProfesor = function() {
            miRol = "profesor";
            showScreen('teacher-screen');
            clickReset(); // Inicializa la base de datos limpia

            // Escuchar cambios de la nube en tiempo real
            onValue(estadoRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                const arena = document.getElementById('arena-board');
                
                if (data.ganador) {
                    // Si la nube dice que hay un ganador y localmente no se ha reflejado
                    const yaTieneGanadorLocal = arena.classList.contains('has-winner');
                    
                    // Marcar visualmente el carril ganador
                    document.querySelectorAll('.lane').forEach(l => l.classList.remove('winner-lane'));
                    const winnerLane = document.getElementById(`lane-${data.ganador}`);
                    if (winnerLane) {
                        winnerLane.classList.add('winner-lane');
                        arena.classList.add('has-winner');
                        document.getElementById(`status-${data.ganador}`).innerText = `¡GANADOR! (+${data.tiempo_servidor}s)`;
                        
                        // Solo reproduce sonido la primera vez que se detecta el cambio
                        if (!yaTieneGanadorLocal) playChime();
                    }
                } else {
                    // Estado de reinicio o juego limpio
                    arena.classList.remove('has-winner');
                    document.querySelectorAll('.lane').forEach(l => {
                        l.classList.remove('winner-lane');
                        const id = l.id.replace('lane-', '');
                        document.getElementById(`status-${id}`).innerText = "Listo";
                    });
                }
            });
        }

        window.clickReset = function() {
            set(estadoRef, { ganador: null, tiempo_servidor: null });
        }

        // Atajo de teclado 'R' para el profesor
        window.addEventListener('keydown', (e) => {
            if (miRol === "profesor" && e.key.toLowerCase() === 'r') clickReset();
        });


        // --- LÓGICA DEL ESTUDIANTE ---
        window.initEstudiante = function() {
            miRol = "estudiante";
            showScreen('student-screen');
        }

        window.selectTeam = function(equipo) {
            miEquipo = equipo;
            document.getElementById('student-screen').style.display = 'none';
            
            // Configurar estéticamente el botón gigante según su color de equipo
            const buzzerContainer = document.getElementById('buzzer-container');
            const mainBuzzer = document.getElementById('main-buzzer');
            
            buzzerContainer.style.display = 'flex';
            if(equipo === 'Azul') mainBuzzer.style.backgroundColor = '#0055ff';
            if(equipo === 'Verde') mainBuzzer.style.backgroundColor = '#00b34a';
            if(equipo === 'Rosa') mainBuzzer.style.backgroundColor = '#e60067';

            // Escuchar el estado de bloqueo desde la nube
            onValue(estadoRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                if (data.ganador) {
                    if (data.ganador === miEquipo) {
                        mainBuzzer.innerText = "¡GANASTE!";
                        mainBuzzer.style.opacity = "1";
                        document.getElementById('blocked-text').style.display = 'none';
                    } else {
                        mainBuzzer.innerText = "BLOQUEADO";
                        mainBuzzer.style.opacity = "0.2";
                        document.getElementById('blocked-text').style.display = 'block';
                    }
                } else {
                    // Resetear botón para la nueva ronda
                    mainBuzzer.innerText = "¡PULSAR!";
                    mainBuzzer.style.opacity = "1";
                    document.getElementById('blocked-text').style.display = 'none';
                }
            });
        }

        window.pressBuzzer = function() {
            const timestamp = (performance.now() / 1000).toFixed(2);
            
            // Intentar escribir al servidor solo si la base de datos está vacía
            fetch(`https://${firebaseConfig.projectId}-default-rtdb.firebaseio.com/sala_concurso/ganador.json`)
            .then(res => res.json())
            .then(ganadorActual => {
                if (!ganadorActual) {
                    set(estadoRef, {
                        ganador: miEquipo,
                        tiempo_servidor: timestamp
                    });
                }
            });
        }

        // --- AUDIO SINCRÓNICO LOCAL (Web Audio API) ---
        function playChime() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioCtx.currentTime;
            const freqs = [523.25, 659.25, 783.99, 1046.50]; // Acorde brillante de televisión
            freqs.forEach((f, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = (i === 0) ? 'triangle' : 'sine';
                osc.frequency.setValueAtTime(f, now);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.2 / freqs.length, now + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 1.2);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 1.3);
            });
        }
    </script>
</body>
</html>
